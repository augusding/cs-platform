version: '3.8'

# 本地开发环境：PostgreSQL + Redis + Milvus（含依赖）
# 启动命令：docker-compose up -d
# 停止命令：docker-compose down
# 清除数据：docker-compose down -v

services:

  # ─── PostgreSQL ───────────────────────────────────────
  postgres:
    container_name: cs-postgres
    image: postgres:15-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: cs_user
      POSTGRES_PASSWORD: cs_pass
      POSTGRES_DB: cs_platform
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U cs_user -d cs_platform"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─── Redis ─────────────────────────────────────────────
  redis:
    container_name: cs-redis
    image: redis:7-alpine
    restart: unless-stopped
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    command: redis-server --appendonly yes
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─── RQ Worker（知识库摄取 / 通知） ─────────────────────
  # 默认在 compose 中不启动，本地开发可用 scripts/start_worker.ps1
  # 生产环境取消 profiles 或用 `docker compose --profile worker up -d`
  worker:
    container_name: cs-worker
    profiles: ["worker"]
    build:
      context: .
      dockerfile: Dockerfile.worker
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql://cs_user:cs_pass@postgres:5432/cs_platform
      REDIS_URL: redis://redis:6379/0
      MILVUS_HOST: milvus
    env_file:
      - .env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./data/uploads:/app/data/uploads
      - ./data/logs:/app/data/logs

  # ─── Milvus 依赖：etcd ─────────────────────────────────
  etcd:
    container_name: cs-etcd
    image: quay.io/coreos/etcd:v3.5.5
    restart: unless-stopped
    environment:
      - ETCD_AUTO_COMPACTION_MODE=revision
      - ETCD_AUTO_COMPACTION_RETENTION=1000
      - ETCD_QUOTA_BACKEND_BYTES=4294967296
      - ETCD_SNAPSHOT_COUNT=50000
    volumes:
      - etcd_data:/etcd
    command: >
      etcd
      -advertise-client-urls=http://127.0.0.1:2379
      -listen-client-urls=http://0.0.0.0:2379
      --data-dir /etcd

  # ─── Milvus 依赖：MinIO ────────────────────────────────
  minio:
    container_name: cs-minio
    image: minio/minio:RELEASE.2023-03-13T19-46-17Z
    restart: unless-stopped
    environment:
      MINIO_ACCESS_KEY: minioadmin
      MINIO_SECRET_KEY: minioadmin
    volumes:
      - minio_data:/data
    command: minio server /data --console-address ":9001"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 20s
      retries: 3

  # ─── Milvus Standalone ─────────────────────────────────
  milvus:
    container_name: cs-milvus
    image: milvusdb/milvus:v2.4.0
    restart: unless-stopped
    command: ["milvus", "run", "standalone"]
    security_opt:
      - seccomp:unconfined
    environment:
      ETCD_ENDPOINTS: etcd:2379
      MINIO_ADDRESS: minio:9000
    volumes:
      - milvus_data:/var/lib/milvus
    ports:
      - "19530:19530"
      - "9091:9091"
    depends_on:
      - etcd
      - minio

volumes:
  postgres_data:
  redis_data:
  etcd_data:
  minio_data:
  milvus_data:
